<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#06d6a0" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<script src="/sw-register.js" defer></script>
<title>Dots and Boxes — Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
<script src="/theme-init.js"></script>
</head>
<body>
  <div class="brand">
    <svg viewBox="0 0 40 40" class="brand-logo" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="8" y="8" width="24" height="24" fill="#06d6a0" rx="2"/>
      <circle cx="8" cy="8" r="3.5" fill="currentColor"/>
      <circle cx="32" cy="8" r="3.5" fill="currentColor"/>
      <circle cx="8" cy="32" r="3.5" fill="currentColor"/>
      <circle cx="32" cy="32" r="3.5" fill="currentColor"/>
    </svg>
    <span class="brand-text">Dots and Boxes</span>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="10" cy="10" r="3.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor">
        <path d="M16 11.5A7 7 0 1 1 8.5 4 5.5 5.5 0 0 0 16 11.5z"/>
      </svg>
    </button>
  </div>

  <div id="connection-status">Connecting…</div>

  <!-- Lobby panel (visible while phase === 'lobby') -->
  <div id="lobby" class="panel">
    <div class="row between" style="margin-bottom: 16px;">
      <h2 style="margin:0;">Lobby</h2>
      <div class="room-code-badge" data-room-code-badge>
        Room <code class="room-code-text">—</code>
        <button class="room-code-copy" data-copy-code type="button" aria-label="Copy room code">Copy</button>
      </div>
    </div>

    <form id="name-form" class="name-row">
      <label class="field" style="flex:1; min-width: 200px;">
        Your name
        <input id="name-input" type="text" maxlength="20" placeholder="Pick a name" autocomplete="off" autocapitalize="words" enterkeyhint="done" />
      </label>
      <button id="name-save-btn" class="accent" type="submit">Save</button>
    </form>

    <div class="row" style="margin-bottom: 16px;">
      <button id="copy-link-btn" class="ghost" type="button">Copy invite link</button>
      <button id="leave-btn" class="ghost" type="button">Leave</button>
    </div>

    <h2 style="margin-top:8px; margin-bottom: 8px; font-size: 16px;">Players</h2>
    <div id="players-list"></div>

    <div id="host-panel" hidden style="margin-top: 16px;">
      <h2 style="margin-bottom: 8px; font-size: 16px;">Game setup (host)</h2>
      <div class="row">
        <label class="field">
          Grid
          <select id="cfg-rows">
            <option value="3">3 × 3</option>
            <option value="4">4 × 4</option>
            <option value="5" selected>5 × 5</option>
            <option value="6">6 × 6</option>
            <option value="7">7 × 7</option>
          </select>
        </label>
        <label class="field">
          Max players
          <select id="cfg-max">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
          </select>
        </label>
        <div class="spacer"></div>
        <button id="add-bot-btn" class="ghost" type="button">+ Add bot</button>
        <button id="start-btn" class="accent" type="button">Start game</button>
      </div>
    </div>

    <div id="lobby-warning" class="warning" hidden></div>
  </div>

  <!-- Game panel (visible while phase === 'in_progress' or 'finished') -->
  <div id="game" class="panel" hidden>
    <div class="row between" style="margin-bottom:12px;">
      <div id="you-pill" class="muted"></div>
      <div class="row" style="gap:8px;">
        <div class="room-code-badge" data-room-code-badge>
          Room <code class="room-code-text">—</code>
          <button class="room-code-copy" data-copy-code type="button" aria-label="Copy room code">Copy</button>
        </div>
        <button id="leave-btn-game" class="ghost" type="button">Leave</button>
      </div>
    </div>
    <div id="scoreboard" class="scoreboard"></div>
  </div>

  <div id="board-wrapper" hidden>
    <svg id="board" width="500" height="500" aria-label="Dots and boxes game board" role="grid"></svg>
  </div>
  <div id="status" class="status" hidden></div>

  <div id="endgame" class="panel narrow" hidden style="text-align:center;">
    <div id="winner-banner" class="winner-banner"></div>
    <div id="rematch-notice" class="rematch-notice" hidden></div>
    <div class="row" style="justify-content:center; margin-top:14px; gap:8px;">
      <button id="play-again-btn" class="accent" type="button" hidden>Play again</button>
      <button id="rematch-btn" class="accent" type="button" hidden>Request rematch</button>
      <button id="back-home-btn" class="ghost" type="button">Back to home</button>
    </div>
  </div>

  <script type="module" src="/dist/client.js"></script>
</body>
</html>

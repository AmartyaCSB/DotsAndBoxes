<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dots and Boxes</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <h1>Dots and Boxes</h1>

  <div class="panel narrow">
    <h2>Play with friends</h2>
    <p class="muted">Create a room and share the link, or join an existing one.</p>
    <div class="landing-actions">
      <button id="create-btn">Create new room</button>
      <div class="or">— OR —</div>
      <form id="join-form">
        <input id="join-input" type="text" inputmode="latin" autocomplete="off" placeholder="room code (6 chars)" maxlength="6" />
        <button type="submit">Join</button>
      </form>
      <div id="join-error" class="error" hidden></div>
    </div>
  </div>

  <script type="module" src="/dist/landing.js"></script>
</body>
</html>
